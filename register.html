<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Learning Hub - Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>Student Learning Hub</h1>
      <nav>
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="courses.html">Courses</a></li>
          <li><a href="register.html" class="active">Register/Login</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-section">
      <h2>Register / Login</h2>
      <p id="selectedCourseInfo" class="form-message"></p>
      <form id="registerForm" novalidate>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" />

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" />

        <p id="formMessage" class="form-message"></p>

        <button type="submit" class="btn">Register</button>
      </form>
    </section>

    <section class="form-section">
      <h2>Login</h2>
      <form id="loginForm" novalidate>
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" name="loginEmail" />

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="loginPassword" />

        <p id="loginFormMessage" class="form-message"></p>

        <button type="submit" class="btn">Login</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Student Learning Hub</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
